name: Deploy Backend

# main 브랜치에 push 될 때마다 서버 재배포
on:
  push:
    branches:
      - main
    paths:
      - 'app/backend/**'
      - 'data_fetcher/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      # ── Docker Hub 이미지 빌드 + 푸시 ─────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketpulse-backend:${{ github.sha }}

      # ── 서버에 SSH 접속해서 docker pull + restart ─────────────────────────
      # Railway 사용 시: 이 step 삭제하고 Railway의 자동 배포 사용
      - name: Deploy to server via SSH
        if: ${{ env.SERVER_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/marketpulse
            # compose가 실행하는 바로 그 이미지(yup2dev/...:latest)를 pull → pull과 run 대상이
            # 항상 일치한다. set -e로 pull 실패가 묻히지 않고, --force-recreate로 새 이미지로
            # 컨테이너를 확실히 교체한다(없으면 구버전 컨테이너가 그대로 남을 수 있다).
            docker compose pull app
            docker compose up -d --no-deps --force-recreate app
            docker image prune -f
            echo "=== deployed image ===" && docker inspect --format '{{.Image}} {{.Config.Image}}' marketpulse-app
