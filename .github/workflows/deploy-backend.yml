name: Deploy Backend

# main 브랜치에 push 될 때마다 서버 재배포
on:
  push:
    branches:
      - main
    paths:
      - 'app/backend/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      # ── Docker Hub 이미지 빌드 + 푸시 ─────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/marketpulse-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/marketpulse-backend:${{ github.sha }}

      # ── 서버에 SSH 접속해서 docker pull + restart ─────────────────────────
      # Railway 사용 시: 이 step 삭제하고 Railway의 자동 배포 사용
      - name: Deploy to server via SSH
        if: ${{ env.SERVER_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/marketpulse
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/marketpulse-backend:latest
            docker compose up -d --no-deps app
            docker image prune -f
